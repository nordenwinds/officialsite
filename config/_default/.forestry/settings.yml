---
new_page_extension: md
auto_deploy: false
admin_path: ''
webhook_url: https://hooks.slack.com/services/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
sections:
- type: heading
  label: Contents
- type: document
  path: content/contact.md
  label: Contact
  match: "**/*"
- type: document
  path: content/about
  label: About
  match: "**/*"
- type: directory
  path: content/blog
  label: blog
  create: documents
  match: "**/*"
- type: heading
  label: Configurations
- type: document
  path: config/_default/config.toml
  label: General
  match: "**/*"
- type: document
  path: config/_default/params.toml
  label: Parameters
  match: "**/*"
- type: document
  path: config/_default/menu.toml
  label: Menu
  match: "**/*"
upload_dir: static/uploads
public_path: "/uploads"
front_matter_path: ''
use_front_matter_path: false
file_template: ":filename:"
build:
  preview_env:
  - HUGO_ENV=staging
  - HUGO_VERSION=0.81.0
  preview_output_directory: public
  preview_docker_image: forestryio/hugo:latest
  mount_path: "/srv"
  working_dir: "/srv"
  instant_preview_command: hugo server -D -E -F --renderToDisk -d public
version: 0.81.0
