<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="/admin/config.yml" type="text/yaml" rel="cms-config-url" />
    <title>CMS - Norden Wind Ensemble</title>
  </head>
  <body>
    <!-- see: https://www.npmjs.com/package/netlify-cms-app -->
    <!-- Add these scripts to the bottom of the body -->
    <script src="https://unpkg.com/react@^16/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@^16/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/netlify-cms-app/dist/netlify-cms-app.js"></script>

    <!-- Initialize the CMS -->
    <script>
      NetlifyCmsApp.init();

      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", user => {
          if (!user) {
            window.netlifyIdentity.on("login", _ => {
              document.location.href = "/admin/";
            });
          }
        });
      }
    </script>
  </body>
